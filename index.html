  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    * { font-family: 'Inter', 'Hiragino Sans', sans-serif; box-sizing: border-box; }
    body { background: #F0F2F5; }

    @keyframes fadeInOut {
      0%   { opacity: 0; transform: translateY(8px) scale(0.95); }
      15%  { opacity: 1; transform: translateY(0) scale(1); }
      75%  { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-8px) scale(0.95); }
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .popup { animation: fadeInOut 1.2s ease-in-out forwards; }
    .task-new { animation: slideIn 0.2s ease-out; }

    .tag-chip {
      position: relative; cursor: pointer; border-radius: 20px;
      padding: 4px 12px; font-size: 12px; font-weight: 500;
      transition: all 0.15s; border: 1.5px solid transparent; user-select: none;
    }
    .tag-chip:hover { filter: brightness(0.95); }
    .tag-chip.selected { border-color: transparent; box-shadow: 0 0 0 2.5px white, 0 0 0 4px currentColor; }

    .card { background: white; border-radius: 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.07), 0 0 0 1px rgba(0,0,0,0.04); }
    .task-row {
      display: flex; align-items: flex-start; gap: 8px;
      padding: 7px 10px; border-radius: 8px; cursor: pointer;
      transition: background 0.1s; user-select: none;
    }
    .task-row:hover { background: #F5F6F8; }
    .task-row.done { opacity: 0.45; }
    .task-row.done .task-text { text-decoration: line-through; }

    .week-task {
      padding: 3px 6px; border-radius: 5px; font-size: 11px;
      cursor: pointer; transition: opacity 0.15s; user-select: none;
      line-height: 1.4; word-break: break-all;
    }
    .week-task:hover { opacity: 0.8; }
    .week-task.done { text-decoration: line-through; opacity: 0.4; }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #D1D5DB; border-radius: 10px; }

    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.4);
      display: flex; align-items: center; justify-content: center; z-index: 100;
      backdrop-filter: blur(2px);
    }
    .modal {
      background: white; border-radius: 16px; padding: 24px; width: 380px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }

    input[type="text"] {
      outline: none; border: 1.5px solid #E5E7EB; border-radius: 10px;
      padding: 9px 14px; font-size: 14px; transition: border-color 0.15s; width: 100%;
    }
    input[type="text"]:focus { border-color: #6366F1; box-shadow: 0 0 0 3px rgba(99,102,241,0.1); }

    select.group-select {
      outline: none; border: 1.5px solid #E5E7EB; border-radius: 8px;
      padding: 4px 8px; font-size: 12px; font-weight: 600; cursor: pointer;
      background: white; transition: border-color 0.15s; flex-shrink: 0;
    }
    select.group-select:focus { border-color: #6366F1; }

    .btn-primary {
      background: #6366F1; color: white; border: none; border-radius: 10px;
      padding: 9px 18px; font-size: 14px; font-weight: 600; cursor: pointer;
      transition: all 0.15s; white-space: nowrap;
    }
    .btn-primary:hover { background: #4F46E5; }
    .btn-primary:disabled { background: #D1D5DB; cursor: not-allowed; }

    .section-title {
      font-size: 13px; font-weight: 600; color: #6B7280;
      letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 12px;
    }

    .group-header {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 10px; padding: 8px 14px; border-radius: 10px;
    }

    /* ログイン画面 */
    .login-screen {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: #F0F2F5;
    }
    .login-card {
      background: white; border-radius: 20px; padding: 40px 48px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1); text-align: center; max-width: 360px; width: 90%;
    }
    .btn-google {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; padding: 12px 20px; border: 1.5px solid #E5E7EB;
      border-radius: 12px; background: white; cursor: pointer; font-size: 15px;
      font-weight: 600; color: #374151; transition: all 0.15s; margin-top: 24px;
    }
    .btn-google:hover { background: #F9FAFB; border-color: #D1D5DB; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const DAY_NAMES = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri'];

    const TAG_COLORS = [
      '#6366F1','#10B981','#F97316','#EC4899','#3B82F6',
      '#EF4444','#8B5CF6','#14B8A6','#F59E0B','#06B6D4',
      '#84CC16','#E11D48','#A855F7','#22C55E','#FB7185',
      '#0EA5E9','#FBBF24','#4ADE80','#F43F5E','#2DD4BF',
      '#38BDF8','#FB923C','#A78BFA','#D946EF','#EAB308',
    ];

    const getColorFromName = (name) => {
      let hash = 0;
      for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
      return TAG_COLORS[Math.abs(hash) % TAG_COLORS.length];
    };

    const hexToRgb = (hex) => {
      const r = parseInt(hex.slice(1,3),16);
      const g = parseInt(hex.slice(3,5),16);
      const b = parseInt(hex.slice(5,7),16);
      return `${r},${g},${b}`;
    };

    // ─── 担当者 ────────────────────────────────────────────────────
    const ASSIGNEES = [
      { id: 'kuriyama', initial: '栗', color: '#6366F1' },
      { id: 'yushi',    initial: 'Y',  color: '#10B981' },
    ];
    // メールアドレス → assigneeId マッピング
    const EMAIL_TO_ASSIGNEE = {
      'si2molo@gmail.com':           'kuriyama',
      'kuriyama@scrapmagazine.com':  'kuriyama',
      'yushi@scrapmagazine.com':     'yushi',
    };
    const getAssignee = (id) => ASSIGNEES.find(a => a.id === id) || null;

    const AssigneeAvatar = ({ assigneeId, size = 18, photos = {} }) => {
      const a = getAssignee(assigneeId);
      if (!a) return null;
      const photoURL = photos[a.id];
      if (photoURL) {
        return (
          <img src={photoURL} alt={a.id}
            style={{ width:size, height:size, borderRadius:'50%', flexShrink:0, objectFit:'cover',
              boxShadow:`0 0 0 2px ${a.color}` }}
          />
        );
      }
      return (
        <span style={{
          display:'inline-flex', alignItems:'center', justifyContent:'center',
          width:size, height:size, borderRadius:'50%',
          background: a.color, color:'white',
          fontSize: size * 0.55, fontWeight:700, flexShrink:0, lineHeight:1,
        }}>{a.initial}</span>
      );
    };

    const GROUPS = ['BeatPhobia', 'DIAEGG'];
    const GROUP_COLORS = { 'BeatPhobia': '#8B5CF6', 'DIAEGG': '#10B981' };
    const GROUP_LABELS = { 'BeatPhobia': 'BP', 'DIAEGG': 'DE' };

    const getTagLabel = (tag) => {
      const label = GROUP_LABELS[tag.group] ?? tag.group;
      return label ? `[${label}] ${tag.name}` : tag.name;
    };

    const DEFAULT_TAGS = [
      { id: 1, name: 'ハロウィン',       group: 'BeatPhobia' },
      { id: 2, name: 'コナン絡繰',       group: 'BeatPhobia' },
      { id: 3, name: 'コナンハイウェイ', group: 'BeatPhobia' },
      { id: 4, name: 'その他',           group: 'BeatPhobia' },
      { id: 5, name: 'アイテムだらけ',   group: 'DIAEGG'     },
      { id: 6, name: 'MMB',              group: 'DIAEGG'     },
      { id: 7, name: '沈黙',             group: 'DIAEGG'     },
      { id: 8, name: 'その他',           group: 'DIAEGG'     },
    ].map((t) => ({ ...t, color: getColorFromName(t.group + t.name) }));

    const getWeekStart = (date) => {
      const d = new Date(date);
      const day = d.getDay();
      d.setDate(d.getDate() - day + (day === 0 ? -6 : 1));
      d.setHours(0,0,0,0);
      return d;
    };
    const getWeekDates = (ws) => Array.from({length:5},(_,i) => { const d=new Date(ws); d.setDate(d.getDate()+i); return d; });
    const formatDate = (date) => `${date.getMonth()+1}/${date.getDate()}`;
    const toDateStr = (date) => {
      const y=date.getFullYear(), m=String(date.getMonth()+1).padStart(2,'0'), d=String(date.getDate()).padStart(2,'0');
      return `${y}-${m}-${d}`;
    };
    const isSameDay = (d1,d2) =>
      d1.getFullYear()===d2.getFullYear() && d1.getMonth()===d2.getMonth() && d1.getDate()===d2.getDate();
    const parseDateStr = (s) => { const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); };

    // ─── Firebase helpers ───────────────────────────────────────────
    const db = firebase.database();
    const REF = {
      tags:  db.ref('shared/tags'),
      tasks: db.ref('shared/tasks'),
    };

    // ─── ログイン画面 ──────────────────────────────────────────────
    const LoginScreen = ({ onLogin }) => (
      <div className="login-screen">
        <div className="login-card">
          <div style={{fontSize:36, marginBottom:8}}>📋</div>
          <div style={{fontSize:22, fontWeight:700, color:'#1F2937', marginBottom:4}}>韓国Todoリスト</div>
          <div style={{fontSize:13, color:'#9CA3AF'}}>許可されたアカウントでログインしてください</div>
          <button className="btn-google" onClick={onLogin}>
            <svg width="18" height="18" viewBox="0 0 18 18">
              <path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 0 0 2.38-5.88c0-.57-.05-.66-.15-1.18z"/>
              <path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2.04a4.8 4.8 0 0 1-7.18-2.54H1.83v2.07A8 8 0 0 0 8.98 17z"/>
              <path fill="#FBBC05" d="M4.5 10.52a4.8 4.8 0 0 1 0-3.04V5.41H1.83a8 8 0 0 0 0 7.18l2.67-2.07z"/>
              <path fill="#EA4335" d="M8.98 4.18c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 0 0 1.83 5.4L4.5 7.49a4.77 4.77 0 0 1 4.48-3.3z"/>
            </svg>
            Googleでログイン
          </button>
        </div>
      </div>
    );

    // ─── アクセス拒否画面 ──────────────────────────────────────────
    const DeniedScreen = ({ user, onLogout }) => (
      <div className="login-screen">
        <div className="login-card">
          <div style={{fontSize:36, marginBottom:8}}>🚫</div>
          <div style={{fontSize:18, fontWeight:700, color:'#1F2937', marginBottom:8}}>アクセス権限がありません</div>
          <div style={{fontSize:13, color:'#6B7280', marginBottom:4}}>{user.email}</div>
          <div style={{fontSize:12, color:'#9CA3AF', marginBottom:20}}>このアカウントは許可されていません</div>
          <button onClick={onLogout} style={{
            background:'none', border:'1.5px solid #E5E7EB', borderRadius:10,
            padding:'8px 20px', cursor:'pointer', fontSize:13, color:'#6B7280'
          }}>別のアカウントでログイン</button>
        </div>
      </div>
    );

    // ─── 期日バッジ ──────────────────────────────────────────────────
    const DueBadge = ({ dueStr, done }) => {
      if (!dueStr) return null;
      const todayStr = toDateStr(new Date());
      const isOverdue = dueStr < todayStr && !done;
      const isToday   = dueStr === todayStr && !done;
      return (
        <span style={{
          fontSize:10, fontWeight:600, padding:'2px 6px', borderRadius:8, flexShrink:0,
          background: isOverdue ? '#FEE2E2' : isToday ? '#FEF3C7' : '#F3F4F6',
          color: isOverdue ? '#DC2626' : isToday ? '#D97706' : '#9CA3AF',
        }}>
          〆{formatDate(parseDateStr(dueStr))}
        </span>
      );
    };

    // ─── TaskRow ───────────────────────────────────────────────────────
    const TaskRow = ({ task, onToggle, onEdit, showDate, onDragStart, onDragEnd, photos = {} }) => {
      const wasDragging = useRef(false);
      return (
        <div
          className={`task-row ${task.done ? 'done' : ''}`}
          draggable
          onDragStart={(e) => { wasDragging.current = true; if(onDragStart) onDragStart(e); }}
          onDragEnd={(e) => { if(onDragEnd) onDragEnd(e); setTimeout(() => { wasDragging.current = false; }, 0); }}
          onClick={() => { if (!wasDragging.current) onToggle(task.id); }}
          onContextMenu={(e) => { e.preventDefault(); onEdit(task); }}
          title="ドラッグでタグ変更 / 右クリックで編集"
          style={{ cursor: 'grab' }}
        >
          <div style={{
            width:16, height:16, borderRadius:'50%', flexShrink:0, marginTop:2,
            border: task.done ? 'none' : '2px solid #D1D5DB',
            background: task.done ? '#10B981' : 'transparent',
            display:'flex', alignItems:'center', justifyContent:'center',
            transition:'all 0.15s',
          }}>
            {task.done && <span style={{color:'white',fontSize:9,lineHeight:1}}>✓</span>}
          </div>
          <span className="task-text" style={{fontSize:13, color:'#374151', lineHeight:1.5, flex:1}}>
            {task.text}
          </span>
          <AssigneeAvatar assigneeId={task.assigneeId} size={18} photos={photos} />
          <div style={{display:'flex', flexDirection:'column', alignItems:'flex-end', gap:2, flexShrink:0}}>
            <DueBadge dueStr={task.dueStr} done={task.done} />
            {showDate && (
              <span style={{fontSize:11,color:'#9CA3AF'}}>
                {formatDate(parseDateStr(task.dateStr))}
              </span>
            )}
          </div>
        </div>
      );
    };

    // ─── 案件ボード ───────────────────────────────────────────────────
    const TagBoard = ({ tags, tasks, toggleDone, setEditingTask, onTagChange, photos = {} }) => {
      const [dragOverTagId, setDragOverTagId] = useState(null);
      const draggingTaskId = useRef(null);

      const todayStr = toDateStr(new Date());
      const showInBoard = (t) => !t.done || t.doneAt === todayStr;

      const renderCard = (tag, cardTasks) => {
        const pending = [...cardTasks].filter(t => !t.done).sort((a,b) => (a.dueStr||'9999') < (b.dueStr||'9999') ? -1 : 1);
        const doneToday = [...cardTasks].filter(t => t.done && t.doneAt === todayStr);
        const color = tag?.color || '#9CA3AF';
        const cardKey = tag?.id ?? 'none';
        const isOver = dragOverTagId === cardKey;

        return (
          <div
            key={cardKey}
            className="card"
            style={{
              overflow:'hidden', display:'flex', flexDirection:'column',
              outline: isOver ? `2px solid ${color}` : '2px solid transparent',
              transition: 'outline 0.12s',
            }}
            onDragOver={(e) => {
              if (draggingTaskId.current !== null) { e.preventDefault(); setDragOverTagId(cardKey); }
            }}
            onDragLeave={(e) => {
              if (!e.currentTarget.contains(e.relatedTarget)) setDragOverTagId(null);
            }}
            onDrop={(e) => {
              e.preventDefault();
              if (draggingTaskId.current !== null) onTagChange(draggingTaskId.current, tag?.id ?? null);
              draggingTaskId.current = null;
              setDragOverTagId(null);
            }}
          >
            <div style={{
              padding:'12px 14px', borderBottom:'1px solid #F3F4F6',
              display:'flex', alignItems:'center', gap:8,
              borderTop:`3px solid ${color}`,
              background: isOver ? `rgba(${hexToRgb(color)},0.06)` : 'white',
              transition:'background 0.12s',
            }}>
              <div style={{width:8,height:8,borderRadius:'50%',background:color,flexShrink:0}}/>
              <span style={{fontWeight:700, fontSize:13, color:'#1F2937', flex:1}}>{tag?.name ?? 'タグなし'}</span>
              <span style={{
                fontSize:11, fontWeight:600, color:color,
                background:`rgba(${hexToRgb(color)},0.1)`,
                padding:'2px 8px', borderRadius:20,
              }}>
                {pending.length}件
              </span>
            </div>

            <div style={{
              padding:'6px 4px', flex:1, maxHeight:260, overflowY:'auto',
              background: isOver ? `rgba(${hexToRgb(color)},0.03)` : 'white',
              transition:'background 0.12s',
            }}>
              {pending.length === 0 && doneToday.length === 0 && (
                <div style={{textAlign:'center', fontSize:12, padding:'16px 0',
                  color: isOver ? color : '#D1D5DB', transition:'color 0.12s',
                }}>
                  {isOver ? 'ここにドロップ ✦' : 'タスクなし'}
                </div>
              )}
              {pending.map(task => (
                <TaskRow key={task.id} task={task} showDate photos={photos}
                  onToggle={toggleDone}
                  onEdit={(t) => setEditingTask({...t, editText:t.text, editTagId:t.tagId, editDueStr:t.dueStr||'', editAssigneeId:t.assigneeId||null})}
                  onDragStart={() => { draggingTaskId.current = task.id; }}
                  onDragEnd={() => { draggingTaskId.current = null; setDragOverTagId(null); }}
                />
              ))}
              {doneToday.length > 0 && (
                <>
                  <div style={{height:1, background:'#F3F4F6', margin:'4px 10px'}}/>
                  {doneToday.map(task => (
                    <TaskRow key={task.id} task={task} showDate photos={photos}
                      onToggle={toggleDone}
                      onEdit={(t) => setEditingTask({...t, editText:t.text, editTagId:t.tagId, editDueStr:t.dueStr||'', editAssigneeId:t.assigneeId||null})}
                      onDragStart={() => { draggingTaskId.current = task.id; }}
                      onDragEnd={() => { draggingTaskId.current = null; setDragOverTagId(null); }}
                    />
                  ))}
                </>
              )}
            </div>
          </div>
        );
      };

      const renderGroupSection = (groupName) => {
        const groupTags = tags.filter(t => t.group === groupName);
        const tagsWithTasks = groupTags.filter(tag => tasks.some(t => t.tagId === tag.id && showInBoard(t)));
        if (tagsWithTasks.length === 0) return null;

        const groupColor = GROUP_COLORS[groupName] || '#9CA3AF';
        const label = GROUP_LABELS[groupName] || groupName;
        const pendingCount = tagsWithTasks.reduce(
          (n, tag) => n + tasks.filter(t => t.tagId === tag.id && !t.done).length, 0
        );

        return (
          <div key={groupName} style={{marginBottom:24}}>
            <div className="group-header" style={{
              background:`rgba(${hexToRgb(groupColor)},0.08)`,
              borderLeft:`3px solid ${groupColor}`,
            }}>
              <span style={{fontWeight:700, fontSize:13, color:groupColor}}>
                [{label}] {groupName}
              </span>
              <span style={{
                fontSize:11, fontWeight:600, color:groupColor,
                background:`rgba(${hexToRgb(groupColor)},0.12)`,
                padding:'2px 8px', borderRadius:20, marginLeft:'auto',
              }}>{pendingCount}件</span>
            </div>
            <div style={{
              display:'grid',
              gridTemplateColumns:'repeat(auto-fill, minmax(200px, 1fr))',
              gap:10,
            }}>
              {tagsWithTasks.map(tag => renderCard(tag, tasks.filter(t => t.tagId === tag.id && showInBoard(t))))}
            </div>
          </div>
        );
      };

      const untagged = tasks.filter(t => !t.tagId && showInBoard(t));
      const hasContent = GROUPS.some(g =>
        tags.some(tag => tag.group === g && tasks.some(t => t.tagId === tag.id && showInBoard(t)))
      ) || untagged.length > 0;

      if (!hasContent) {
        return (
          <div style={{textAlign:'center',padding:'40px 0',color:'#9CA3AF',fontSize:14}}>
            タスクを追加すると案件ごとにまとめて表示されます
          </div>
        );
      }

      return (
        <div>
          {GROUPS.map(g => renderGroupSection(g))}
          {untagged.length > 0 && (
            <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(200px, 1fr))', gap:10}}>
              {renderCard(null, untagged)}
            </div>
          )}
        </div>
      );
    };

    // ─── メインコンポーネント ──────────────────────────────────────────
    function App() {
      // ─ Auth state ─
      const [user, setUser]             = useState(null);
      const [authLoading, setAuthLoading] = useState(true);

      // ─ Data state ─
      const [tags, setTags]   = useState(DEFAULT_TAGS);
      const [tasks, setTasks] = useState([]);
      const [photos, setPhotos] = useState({}); // { kuriyama: 'https://...', yushi: 'https://...' }
      const [dataReady, setDataReady] = useState(false);

      // ─ UI state ─
      const [inputText, setInputText]         = useState('');
      const [inputDueStr, setInputDueStr]     = useState('');
      const [selectedTagId, setSelectedTagId] = useState(null);
      const [selectedAssigneeId, setSelectedAssigneeId] = useState(null);
      const [newTagName, setNewTagName]       = useState('');
      const [newTagGroup, setNewTagGroup]     = useState('BeatPhobia');
      const [showTagInput, setShowTagInput]   = useState(false);
      const [weekOffset, setWeekOffset]       = useState(0);
      const [popup, setPopup]                 = useState(null);
      const [confirmDelTagId, setConfirmDelTagId] = useState(null);
      const [editingTask, setEditingTask]     = useState(null);
      const [weekDragOverDate, setWeekDragOverDate] = useState(null);
      const weekDragTaskId = useRef(null);
      const isComposing    = useRef(false);
      const popupTimer     = useRef(null);

      // Firebase同期ループ防止フラグ
      const skipTagSync  = useRef(false);
      const skipTaskSync = useRef(false);

      // ─── Google認証 ──────────────────────────────────────────────
      useEffect(() => {
        const unsub = firebase.auth().onAuthStateChanged((u) => {
          setUser(u);
          setAuthLoading(false);
        });
        return unsub;
      }, []);

      const handleLogin = () => {
        const provider = new firebase.auth.GoogleAuthProvider();
        firebase.auth().signInWithPopup(provider).catch(console.error);
      };

      const handleLogout = () => {
        firebase.auth().signOut();
        setDataReady(false);
        setTags(DEFAULT_TAGS);
        setTasks([]);
        setPhotos({});
      };

      // ─── ログイン時：自分の写真をFirebaseに保存 ──────────────────
      useEffect(() => {
        if (!user || !ALLOWED_EMAILS.includes(user.email)) return;
        const assigneeId = EMAIL_TO_ASSIGNEE[user.email];
        if (assigneeId && user.photoURL) {
          db.ref(`shared/photos/${assigneeId}`).set(user.photoURL);
        }
      }, [user]);

      // ─── Firebaseリアルタイム同期 ─────────────────────────────────
      useEffect(() => {
        if (!user || !ALLOWED_EMAILS.includes(user.email)) return;

        // タグ同期
        REF.tags.on('value', (snap) => {
          if (skipTagSync.current) { skipTagSync.current = false; return; }
          const val = snap.val();
          if (val && Array.isArray(val)) setTags(val);
          else if (!val) REF.tags.set(DEFAULT_TAGS); // 初回：デフォルトを書き込む
        });

        // タスク同期
        REF.tasks.on('value', (snap) => {
          if (skipTaskSync.current) { skipTaskSync.current = false; return; }
          const val = snap.val();
          setTasks(val && Array.isArray(val) ? val : []);
          setDataReady(true);
        });

        // 写真同期
        const photosRef = db.ref('shared/photos');
        photosRef.on('value', (snap) => {
          const val = snap.val();
          if (val) setPhotos(val);
        });

        return () => {
          REF.tags.off();
          REF.tasks.off();
          photosRef.off();
        };
      }, [user]);

      // ─── Firebase書き込みヘルパー ─────────────────────────────────
      const writeTags = (newTags) => {
        skipTagSync.current = true;
        REF.tags.set(newTags).catch(console.error);
        setTags(newTags);
      };

      const writeTasks = (newTasksOrFn) => {
        setTasks(prev => {
          const next = typeof newTasksOrFn === 'function' ? newTasksOrFn(prev) : newTasksOrFn;
          skipTaskSync.current = true;
          REF.tasks.set(next).catch(console.error);
          return next;
        });
      };

      // ─── UI helpers ──────────────────────────────────────────────
      const today = new Date();
      const thisWeekStart = getWeekStart(today);
      const currentMonth = today.getMonth();
      const currentYear  = today.getFullYear();

      const showPopup = (text, color) => {
        if (popupTimer.current) clearTimeout(popupTimer.current);
        setPopup({ key: Date.now(), text, color });
        popupTimer.current = setTimeout(() => setPopup(null), 1300);
      };

      // ─── タスク操作 ───────────────────────────────────────────────
      const addTask = () => {
        if (!inputText.trim()) return;
        writeTasks(prev => [...prev, {
          id: Date.now(), text: inputText.trim(),
          tagId: selectedTagId, dateStr: toDateStr(today), done: false,
          dueStr: inputDueStr || null,
          assigneeId: selectedAssigneeId || null,
        }]);
        setInputText('');
        showPopup('がんば〜💪', '#6366F1');
      };

      const moveTaskToDate = (taskId, newDateStr) => {
        writeTasks(prev => prev.map(t => t.id === taskId ? {...t, dateStr: newDateStr} : t));
      };

      const toggleDone = (taskId) => {
        const task = tasks.find(t => t.id === taskId);
        if (!task) return;
        writeTasks(prev => prev.map(t => t.id === taskId
          ? {...t, done: !t.done, doneAt: !t.done ? toDateStr(new Date()) : null}
          : t
        ));
        if (!task.done) showPopup('おつ〜🎉', '#F97316');
      };

      const getTag = (tagId) => tags.find(t => t.id === tagId);

      const addTag = () => {
        if (!newTagName.trim()) return;
        writeTags([...tags, {
          id: Date.now(),
          name: newTagName.trim(),
          group: newTagGroup,
          color: getColorFromName(newTagGroup + newTagName.trim()),
        }]);
        setNewTagName('');
        setShowTagInput(false);
      };

      const changeTaskTag = (taskId, newTagId) => {
        writeTasks(prev => prev.map(t => t.id === taskId ? {...t, tagId: newTagId} : t));
      };

      const deleteTag = (id) => {
        writeTags(tags.filter(t => t.id !== id));
        setSelectedTagId(null);
        setConfirmDelTagId(null);
      };

      const deleteTask = (id) => {
        writeTasks(prev => prev.filter(t => t.id !== id));
        setEditingTask(null);
      };

      const saveTaskEdit = () => {
        if (!editingTask) return;
        writeTasks(prev => prev.map(t => t.id === editingTask.id ? {
          ...t, text: editingTask.editText, tagId: editingTask.editTagId,
          dueStr: editingTask.editDueStr || null,
          assigneeId: editingTask.editAssigneeId || null,
        } : t));
        setEditingTask(null);
      };

      const downloadCSV = (target, filename) => {
        const rows = target.map(t => {
          const tag = tags.find(g => g.id === t.tagId);
          return [t.dateStr, tag?.name||'', `"${t.text.replace(/"/g,'""')}"`, t.done?'✓':''].join(',');
        });
        const csv = [['日付','タグ','内容','完了'].join(','), ...rows].join('\n');
        const blob = new Blob([new Uint8Array([0xEF,0xBB,0xBF]), csv], {type:'text/csv;charset=utf-8'});
        const a = Object.assign(document.createElement('a'), {href:URL.createObjectURL(blob), download:filename});
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
      };

      // ─── 週ビュー ──────────────────────────────────────────────────
      const renderWeek = () => {
        const ws = new Date(thisWeekStart);
        ws.setDate(ws.getDate() + weekOffset * 7);
        const dates = getWeekDates(ws);
        const isCurrent = weekOffset === 0;

        return (
          <div>
            <div style={{display:'flex', alignItems:'center', gap:8, marginBottom:10}}>
              <button onClick={() => setWeekOffset(v => v-1)}
                style={{border:'none',background:'none',cursor:'pointer',color:'#9CA3AF',fontSize:16,padding:'2px 6px'}}>‹</button>
              <span style={{fontSize:13,fontWeight:600,color:'#6B7280'}}>
                {formatDate(dates[0])} — {formatDate(dates[4])}
                {!isCurrent && <span style={{marginLeft:8,color:'#D1D5DB',fontSize:12}}>過去</span>}
              </span>
              {!isCurrent && (
                <button onClick={() => setWeekOffset(v => v+1)}
                  style={{border:'none',background:'none',cursor:'pointer',color:'#9CA3AF',fontSize:16,padding:'2px 6px'}}>›</button>
              )}
            </div>

            <div style={{display:'grid', gridTemplateColumns:'repeat(5,1fr)', gap:6}}>
              {dates.map((date, i) => {
                const dateStr = toDateStr(date);
                const isToday = isSameDay(date, today);
                const isDragOver = weekDragOverDate === dateStr;
                const dayTasks = tasks.filter(t => t.dateStr === dateStr);

                return (
                  <div key={i} className="card" style={{
                    overflow:'hidden',
                    border: isDragOver ? '2px dashed #6366F1' : isToday ? '2px solid #6366F1' : '2px solid transparent',
                    background: isDragOver ? '#F5F3FF' : 'white',
                    transition: 'border 0.1s, background 0.1s',
                  }}
                    onDragOver={(e) => { if(weekDragTaskId.current !== null) { e.preventDefault(); setWeekDragOverDate(dateStr); } }}
                    onDragLeave={(e) => { if(!e.currentTarget.contains(e.relatedTarget)) setWeekDragOverDate(null); }}
                    onDrop={(e) => {
                      e.preventDefault();
                      if(weekDragTaskId.current !== null) moveTaskToDate(weekDragTaskId.current, dateStr);
                      weekDragTaskId.current = null; setWeekDragOverDate(null);
                    }}
                  >
                    <div style={{
                      padding:'6px 0', textAlign:'center', fontSize:11, fontWeight:isToday?700:500,
                      color: isToday?'#6366F1':'#9CA3AF',
                      background: isToday?'#EEF2FF':'#FAFAFA',
                      borderBottom:'1px solid #F3F4F6',
                    }}>
                      <div>{formatDate(date)}</div>
                      <div>{DAY_NAMES[i]}</div>
                    </div>
                    <div style={{padding:4, minHeight:80, display:'flex', flexDirection:'column', gap:3}}>
                      {dayTasks.length === 0 && (
                        <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',
                          color: isDragOver ? '#6366F1' : '#E5E7EB', fontSize:11}}>
                          {isDragOver ? 'ここに移動' : '-'}
                        </div>
                      )}
                      {dayTasks.map(task => {
                        const tag = getTag(task.tagId);
                        const color = tag?.color || '#9CA3AF';
                        const isOverdue = task.dueStr && task.dueStr < toDateStr(today) && !task.done;
                        return (
                          <div
                            key={task.id}
                            className={`week-task ${task.done ? 'done' : ''}`}
                            draggable
                            onDragStart={(e) => { weekDragTaskId.current = task.id; e.stopPropagation(); }}
                            onDragEnd={() => { weekDragTaskId.current = null; setWeekDragOverDate(null); }}
                            style={{
                              background: `rgba(${hexToRgb(color)},${task.done?0.15:0.85})`,
                              color: task.done ? color : 'white',
                              cursor: 'grab',
                              outline: isOverdue && !task.done ? '1.5px solid #DC2626' : 'none',
                            }}
                            onClick={() => toggleDone(task.id)}
                            onContextMenu={(e) => { e.preventDefault(); setEditingTask({...task, editText:task.text, editTagId:task.tagId, editDueStr:task.dueStr||'', editAssigneeId:task.assigneeId||null}); }}
                            title={`ドラッグで移動 / 右クリックで編集${task.dueStr ? ' / 期日: ' + task.dueStr : ''}`}
                          >
                            <div>{task.text}</div>
                            {task.dueStr && <div style={{fontSize:9, opacity:0.85}}>〆{formatDate(parseDateStr(task.dueStr))}</div>}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                );
              })}
            </div>
            <div style={{textAlign:'right',fontSize:11,color:'#D1D5DB',marginTop:4}}>ドラッグで日程移動 / 右クリックで編集</div>
          </div>
        );
      };

      // タグチップ表示
      const renderTagChips = () => {
        return GROUPS.map(groupName => {
          const groupTags = tags.filter(t => t.group === groupName);
          if (groupTags.length === 0) return null;
          const groupColor = GROUP_COLORS[groupName] || '#9CA3AF';
          const label = GROUP_LABELS[groupName] || groupName;
          return (
            <div key={groupName} style={{display:'flex', flexWrap:'wrap', gap:6, alignItems:'center', marginBottom:4}}>
              <span style={{
                fontSize:11, fontWeight:700, color:groupColor,
                background:`rgba(${hexToRgb(groupColor)},0.1)`,
                padding:'3px 8px', borderRadius:20, flexShrink:0,
              }}>[{label}]</span>
              {groupTags.map((tag) => {
                const globalIndex = tags.indexOf(tag);
                return (
                  <div key={tag.id} style={{display:'flex',alignItems:'center'}}
                    draggable
                    onDragStart={(e) => { e.dataTransfer.setData('idx', String(globalIndex)); e.currentTarget.style.opacity='0.4'; }}
                    onDragEnd={(e) => { e.currentTarget.style.opacity='1'; }}
                    onDragOver={(e) => e.preventDefault()}
                    onDrop={(e) => {
                      e.preventDefault();
                      const from = parseInt(e.dataTransfer.getData('idx'));
                      if (from === globalIndex) return;
                      const arr = [...tags];
                      const [moved] = arr.splice(from,1);
                      arr.splice(globalIndex,0,moved);
                      writeTags(arr);
                    }}
                  >
                    <button
                      className={`tag-chip ${selectedTagId===tag.id ? 'selected' : ''}`}
                      onClick={() => { setSelectedTagId(selectedTagId===tag.id ? null : tag.id); setConfirmDelTagId(null); setShowTagInput(false); }}
                      style={{
                        background: selectedTagId===tag.id ? tag.color : `rgba(${hexToRgb(tag.color)},0.12)`,
                        color: selectedTagId===tag.id ? 'white' : tag.color,
                      }}
                    >{tag.name}</button>
                    {selectedTagId===tag.id && (
                      <button onClick={() => setConfirmDelTagId(tag.id)}
                        style={{marginLeft:2,width:18,height:18,borderRadius:'50%',background:'#EF4444',color:'white',border:'none',cursor:'pointer',fontSize:10,display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>
                    )}
                  </div>
                );
              })}
            </div>
          );
        });
      };

      // ─── 認証ガード ───────────────────────────────────────────────
      if (authLoading) {
        return (
          <div className="login-screen">
            <div style={{color:'#9CA3AF', fontSize:14}}>読み込み中...</div>
          </div>
        );
      }
      if (!user) return <LoginScreen onLogin={handleLogin} />;
      if (!ALLOWED_EMAILS.includes(user.email)) return <DeniedScreen user={user} onLogout={handleLogout} />;
      if (!dataReady) {
        return (
          <div className="login-screen">
            <div style={{color:'#9CA3AF', fontSize:14}}>データ読み込み中...</div>
          </div>
        );
      }

      // ─── メインUI ────────────────────────────────────────────────
      return (
        <div style={{minHeight:'100vh', padding:'20px 16px', maxWidth:1100, margin:'0 auto'}}>

          {/* ポップアップ */}
          {popup && (
            <div key={popup.key} className="popup" style={{
              position:'fixed', inset:0, display:'flex', alignItems:'center', justifyContent:'center',
              zIndex:200, pointerEvents:'none',
            }}>
              <div style={{
                fontSize:24, fontWeight:700, color:popup.color,
                background:'rgba(255,255,255,0.95)', padding:'14px 28px',
                borderRadius:16, boxShadow:'0 8px 40px rgba(0,0,0,0.15)',
              }}>
                {popup.text}
              </div>
            </div>
          )}

          {/* 編集モーダル */}
          {editingTask && (
            <div className="modal-overlay" onClick={(e) => { if(e.target===e.currentTarget) setEditingTask(null); }}>
              <div className="modal">
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
                  <span style={{fontWeight:700,fontSize:16,color:'#1F2937'}}>タスクを編集</span>
                  <button onClick={() => setEditingTask(null)}
                    style={{border:'none',background:'none',cursor:'pointer',color:'#9CA3AF',fontSize:20,lineHeight:1}}>✕</button>
                </div>

                <div style={{marginBottom:14}}>
                  <label style={{fontSize:12,fontWeight:600,color:'#6B7280',display:'block',marginBottom:6}}>内容</label>
                  <input type="text" value={editingTask.editText}
                    onChange={(e) => setEditingTask({...editingTask, editText:e.target.value})}
                    onKeyDown={(e) => { if(e.key==='Enter'&&!isComposing.current) saveTaskEdit(); }}
                    autoFocus />
                </div>

                <div style={{marginBottom:14}}>
                  <label style={{fontSize:12,fontWeight:600,color:'#6B7280',display:'block',marginBottom:6}}>期日（任意）</label>
                  <div style={{display:'flex',alignItems:'center',gap:8}}>
                    <input
                      type="date"
                      value={editingTask.editDueStr || ''}
                      onChange={(e) => setEditingTask({...editingTask, editDueStr: e.target.value})}
                      style={{border:'1.5px solid #E5E7EB', borderRadius:10, padding:'8px 12px', fontSize:13, outline:'none', width:'100%'}}
                    />
                    {editingTask.editDueStr && (
                      <button onClick={() => setEditingTask({...editingTask, editDueStr: ''})}
                        style={{border:'none',background:'none',color:'#9CA3AF',cursor:'pointer',fontSize:16,flexShrink:0}}>✕</button>
                    )}
                  </div>
                </div>

                <div style={{marginBottom:14}}>
                  <label style={{fontSize:12,fontWeight:600,color:'#6B7280',display:'block',marginBottom:8}}>担当者</label>
                  <div style={{display:'flex', gap:8}}>
                    <button onClick={() => setEditingTask({...editingTask, editAssigneeId: null})}
                      style={{
                        width:32, height:32, borderRadius:'50%', border:'1.5px solid #E5E7EB',
                        cursor:'pointer', fontSize:11, fontWeight:600,
                        background: !editingTask.editAssigneeId ? '#374151' : 'white',
                        color: !editingTask.editAssigneeId ? 'white' : '#9CA3AF',
                      }}>－</button>
                    {ASSIGNEES.map(a => (
                      <button key={a.id} onClick={() => setEditingTask({...editingTask, editAssigneeId: a.id})}
                        style={{
                          width:32, height:32, borderRadius:'50%', border:'none', cursor:'pointer', padding:0,
                          background: photos[a.id] ? 'transparent' : (editingTask.editAssigneeId === a.id ? a.color : `rgba(${hexToRgb(a.color)},0.15)`),
                          color: editingTask.editAssigneeId === a.id ? 'white' : a.color,
                          fontSize:13, fontWeight:700, overflow:'hidden',
                          boxShadow: editingTask.editAssigneeId === a.id ? `0 0 0 2px white, 0 0 0 4px ${a.color}` : 'none',
                          transition:'all 0.15s',
                        }}>
                        {photos[a.id]
                          ? <img src={photos[a.id]} alt={a.id} style={{width:32,height:32,objectFit:'cover',display:'block'}} />
                          : a.initial}
                      </button>
                    ))}
                  </div>
                </div>

                <div style={{marginBottom:20}}>
                  <label style={{fontSize:12,fontWeight:600,color:'#6B7280',display:'block',marginBottom:8}}>タグ</label>
                  <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                    <button
                      onClick={() => setEditingTask({...editingTask, editTagId:null})}
                      className="tag-chip"
                      style={{
                        background: editingTask.editTagId===null ? '#374151' : '#F3F4F6',
                        color: editingTask.editTagId===null ? 'white' : '#6B7280',
                      }}
                    >なし</button>
                    {tags.map(tag => (
                      <button key={tag.id}
                        onClick={() => setEditingTask({...editingTask, editTagId:tag.id})}
                        className="tag-chip"
                        style={{
                          background: editingTask.editTagId===tag.id ? tag.color : `rgba(${hexToRgb(tag.color)},0.1)`,
                          color: editingTask.editTagId===tag.id ? 'white' : tag.color,
                        }}
                      >{getTagLabel(tag)}</button>
                    ))}
                  </div>
                </div>

                {editingTask.confirmDelete ? (
                  <div style={{display:'flex',gap:8,alignItems:'center'}}>
                    <span style={{fontSize:13,color:'#EF4444',flex:1}}>本当に消す？</span>
                    <button onClick={() => deleteTask(editingTask.id)}
                      style={{background:'#EF4444',color:'white',border:'none',borderRadius:8,padding:'8px 16px',cursor:'pointer',fontWeight:600}}>消す</button>
                    <button onClick={() => setEditingTask({...editingTask,confirmDelete:false})}
                      style={{background:'#F3F4F6',color:'#374151',border:'none',borderRadius:8,padding:'8px 16px',cursor:'pointer'}}>やめる</button>
                  </div>
                ) : (
                  <div style={{display:'flex',gap:8}}>
                    <button onClick={saveTaskEdit} className="btn-primary" style={{flex:1}}>保存</button>
                    <button onClick={() => setEditingTask({...editingTask,confirmDelete:true})}
                      style={{background:'none',border:'none',color:'#EF4444',cursor:'pointer',padding:'8px 12px',fontWeight:500,fontSize:13}}>消す</button>
                  </div>
                )}
              </div>
            </div>
          )}

          {/* ヘッダー */}
          <div style={{marginBottom:20, display:'flex', alignItems:'center', justifyContent:'space-between'}}>
            <div style={{display:'flex', alignItems:'baseline', gap:12}}>
              <h1 style={{fontSize:22,fontWeight:700,color:'#1F2937',margin:0}}>📋 韓国Todoリスト</h1>
              <span style={{fontSize:13,color:'#9CA3AF'}}>
                {today.getFullYear()}年{today.getMonth()+1}月{today.getDate()}日
              </span>
            </div>
            {/* ユーザー情報 + ログアウト */}
            <div style={{display:'flex', alignItems:'center', gap:8}}>
              <img src={user.photoURL} alt="" style={{width:28,height:28,borderRadius:'50%'}} />
              <span style={{fontSize:12,color:'#6B7280'}}>{user.displayName || user.email}</span>
              <button onClick={handleLogout} style={{
                fontSize:11, color:'#9CA3AF', background:'none',
                border:'1px solid #E5E7EB', borderRadius:8, padding:'3px 10px', cursor:'pointer'
              }}>ログアウト</button>
            </div>
          </div>

          {/* 入力エリア */}
          <div className="card" style={{padding:20,marginBottom:16}}>
            <div style={{display:'flex',gap:8,marginBottom:14,alignItems:'center'}}>
              <input
                type="text"
                value={inputText}
                onChange={(e) => setInputText(e.target.value)}
                placeholder="今日やること..."
                onCompositionStart={() => { isComposing.current=true; }}
                onCompositionEnd={() => { isComposing.current=false; }}
                onKeyDown={(e) => { if(e.key==='Enter'&&!isComposing.current) addTask(); }}
              />
              <div style={{display:'flex',alignItems:'center',gap:4,flexShrink:0}}>
                <span style={{fontSize:11,color:'#9CA3AF',whiteSpace:'nowrap'}}>〆期日</span>
                <input
                  type="date"
                  value={inputDueStr}
                  onChange={(e) => setInputDueStr(e.target.value)}
                  style={{
                    border:'1.5px solid #E5E7EB', borderRadius:10, padding:'8px 8px',
                    fontSize:12, color: inputDueStr ? '#374151' : '#9CA3AF',
                    cursor:'pointer', outline:'none', width:130,
                  }}
                />
              </div>
              {/* 担当者選択 */}
              <div style={{display:'flex', gap:4, flexShrink:0}}>
                {ASSIGNEES.map(a => (
                  <button key={a.id} onClick={() => setSelectedAssigneeId(selectedAssigneeId === a.id ? null : a.id)}
                    title={a.id}
                    style={{
                      width:32, height:32, borderRadius:'50%', border:'none', cursor:'pointer', padding:0,
                      background: photos[a.id] ? 'transparent' : (selectedAssigneeId === a.id ? a.color : `rgba(${hexToRgb(a.color)},0.15)`),
                      color: selectedAssigneeId === a.id ? 'white' : a.color,
                      fontSize:13, fontWeight:700, overflow:'hidden',
                      boxShadow: selectedAssigneeId === a.id ? `0 0 0 2px white, 0 0 0 4px ${a.color}` : 'none',
                      transition:'all 0.15s', flexShrink:0,
                    }}>
                    {photos[a.id]
                      ? <img src={photos[a.id]} alt={a.id} style={{width:32,height:32,objectFit:'cover',display:'block'}} />
                      : a.initial}
                  </button>
                ))}
              </div>
              <button onClick={addTask} disabled={!inputText.trim()} className="btn-primary">
                🚀 これやるよ
              </button>
            </div>

            <div style={{display:'flex', flexDirection:'column', gap:2}}>
              {renderTagChips()}
              <div style={{marginTop:4}}>
                {showTagInput ? (
                  <div style={{display:'flex', gap:6, alignItems:'center'}}>
                    <select className="group-select" value={newTagGroup} onChange={(e) => setNewTagGroup(e.target.value)}>
                      <option value="BeatPhobia">[BP]</option>
                      <option value="DIAEGG">[DE]</option>
                    </select>
                    <input type="text" value={newTagName} onChange={(e)=>setNewTagName(e.target.value)}
                      placeholder="タグ名" style={{width:100,fontSize:12,padding:'4px 10px'}}
                      onKeyDown={(e) => { if(e.key==='Enter') addTag(); if(e.key==='Escape') setShowTagInput(false); }}
                      onBlur={() => { if(newTagName.trim()) addTag(); else setShowTagInput(false); }}
                      autoFocus />
                  </div>
                ) : (
                  <button
                    onClick={() => { setSelectedTagId(null); setConfirmDelTagId(null); setShowTagInput(true); }}
                    style={{fontSize:12,color:'#9CA3AF',background:'none',border:'1.5px dashed #D1D5DB',borderRadius:20,padding:'4px 12px',cursor:'pointer'}}>
                    + タグ追加
                  </button>
                )}
              </div>
            </div>

            {confirmDelTagId && (
              <div style={{marginTop:10,padding:'10px 14px',background:'#FEF2F2',borderRadius:10,display:'flex',alignItems:'center',gap:8}}>
                <span style={{fontSize:13,color:'#B91C1C',flex:1}}>「{tags.find(t=>t.id===confirmDelTagId)?.name}」を削除しますか？</span>
                <button onClick={() => deleteTag(confirmDelTagId)}
                  style={{background:'#EF4444',color:'white',border:'none',borderRadius:6,padding:'5px 12px',cursor:'pointer',fontSize:12}}>消す</button>
                <button onClick={() => setConfirmDelTagId(null)}
                  style={{background:'#E5E7EB',color:'#374151',border:'none',borderRadius:6,padding:'5px 12px',cursor:'pointer',fontSize:12}}>やめる</button>
              </div>
            )}
          </div>

          {/* 案件ボード */}
          <div style={{marginBottom:16}}>
            <div className="section-title" style={{paddingLeft:4}}>📌 案件ボード</div>
            <TagBoard
              tags={tags}
              tasks={tasks}
              toggleDone={toggleDone}
              setEditingTask={setEditingTask}
              onTagChange={changeTaskTag}
              photos={photos}
            />
          </div>

          {/* 週ビュー */}
          <div className="card" style={{padding:20,marginBottom:16}}>
            <div className="section-title">📅 {currentYear}年{currentMonth+1}月</div>
            {renderWeek()}
          </div>

          {/* CSVダウンロード（フッター） */}
          <div style={{textAlign:'center', paddingBottom:20}}>
            <button onClick={() => downloadCSV(tasks, `todo-${currentYear}-${currentMonth+1}.csv`)}
              style={{fontSize:12,color:'#9CA3AF',background:'none',border:'1px solid #E5E7EB',borderRadius:8,padding:'5px 14px',cursor:'pointer'}}>
              📥 CSVダウンロード
            </button>
          </div>

        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
